<VirtualHost *:80>
    ServerName cine.sendera.local
    ServerAdmin admin@cine.sendera.local

    DocumentRoot /var/www/html/cine/public

    <Directory /var/www/html/cine/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    Alias /src /var/www/html/cine/src
    <Directory /var/www/html/cine/src>
        Require all granted
    </Directory>

    # Redirigir errores a logs específicos
    ErrorLog ${APACHE_LOG_DIR}/cine_error.log
    CustomLog ${APACHE_LOG_DIR}/cine_access.log combined

    # Ocultar versión de Apache/PHP
    ServerSignature Off
    ServerTokens Prod
</VirtualHost>
